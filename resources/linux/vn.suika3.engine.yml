id: vn.suika3.engine
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: suika3-run.sh

sdk-extensions:
  - org.freedesktop.Platform.GStreamer.openmpt
  
build-options:
  append-path: /usr/lib/sdk/GStreamer/bin
  append-ld-library-path: /usr/lib/sdk/GStreamer/lib
  append-pkg-config-path: /usr/lib/sdk/GStreamer/lib/pkgconfig

finish-args:
  - --socket=x11
  - --device=dri
  - --filesystem=host

modules:
  - name: suika3
    buildsystem: cmake-ninja
    config-opts:
      - "-DCMAKE_BUILD_TYPE=Release"
      - "-DSUIKA_TARGET_LINUX=ON"
      - "-DSUIKA_ENABLE_INSTALL=ON"
      - "-DSUIKA_ENABLE_FLATPAK=ON"
      - "-DSUIKA_ENABLE_DIST=ON"
      - "-DSUIKA_ENABLE_GST=ON"
      - "-DSUIKA_ENABLE_JIT=ON"
      - "-DSUIKA_ENABLE_I18N=ON"
      - "-DSUIKA_ENABLE_PACK=ON"
      - "-DSUIKA_ENABLE_BYTECOMP=ON"
      - "-DSUIKA_ENABLE_AOTCOMP=ON"
      - "-DSUIKA_ENABLE_GST=ON"
    sources:
      - type: dir
        path: ../..
    post-install:
      - update-mime-database /app/share/mime
      - update-desktop-database /app/share/applications
