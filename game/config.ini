############################################################
## Game Settings

#
# Game title
#

game.title.en=Little Sample
game.title.ja=Little Sample

#
# Enable novel mode
#  - false: Adventure mode
#  - true:  Novel mode
#

game.novel=false

#
# Language setting
#  - "":   Use the system setting
#  - "ja": Fix to Japanese
#  - "en": Fix to English
#

game.locale=ja

############################################################
## Font File Settings

# Font 1
#  - Default font
#  - You can choose this font by \f{1} in a message
font.ttf1=system/font/rounded-l-mplus-1c-bold.ttf

# Font 2
#  - You can choose this font by \f{2} in a message
#font.ttf2=

